kind = "video"
previewPath = "/learning-is-everywhere-video/"
title = "Learning Is Everywhere"
version = "1.0.0"
id = "artifacts/learning-is-everywhere-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/learning-is-everywhere-video/" ]
localPort = 23165

[services.development]
run = "pnpm --filter @workspace/learning-is-everywhere-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/learning-is-everywhere-video", "run", "build" ]
publicDir = "artifacts/learning-is-everywhere-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23165"
BASE_PATH = "/learning-is-everywhere-video/"
